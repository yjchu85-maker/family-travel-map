<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리가족 여행지도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#FFE8ED; --card:#FFF5E4; --main:#F4A7B9; --deep:#E8849A;
  --light:#FFDCE4; --text:#5C3A3A; --muted:#B8909A;
  --white:#fff; --border:rgba(244,167,185,0.4);
  --shadow:0 4px 20px rgba(232,132,154,0.15);
  --mapU:#E8D5C4; --mapB:#D4C0B0;
}
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

#theme-bar { display:flex; justify-content:flex-end; gap:8px; padding:10px 16px 0; }
.theme-btn { width:26px; height:26px; border-radius:50%; border:2.5px solid transparent; cursor:pointer; transition:transform .15s,border-color .15s; box-shadow:0 2px 6px rgba(0,0,0,.12); }
.theme-btn.active { border-color:var(--text); transform:scale(1.15); }

header { padding:8px 16px 0; display:flex; align-items:center; justify-content:space-between; }
.title-badge { background:var(--main); border-radius:50px; padding:8px 20px 10px; box-shadow:0 3px 0 var(--deep),var(--shadow); display:inline-flex; align-items:center; transition:background .35s,box-shadow .35s; }
.title-badge h1 { font-family:'Nanum Pen Script',cursive; font-size:26px; font-weight:400; color:#fff; letter-spacing:1px; line-height:1; }
.stats-pills { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.stats-pills span { font-size:11px; color:var(--muted); background:rgba(255,255,255,.6); padding:3px 10px; border-radius:20px; }
.stats-pills strong { color:var(--deep); font-weight:700; }

#tab-bar { display:flex; margin:12px 12px 0; background:rgba(255,255,255,.5); border-radius:16px; padding:4px; gap:4px; }
.tab-btn { flex:1; padding:10px; border:none; background:none; border-radius:12px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; transition:background .2s,color .2s; }
.tab-btn.active { background:var(--main); color:#fff; box-shadow:0 2px 8px rgba(0,0,0,.1); }

.tab-content { display:none; }
.tab-content.active { display:block; }

#map-card { margin:10px 12px 0; background:var(--card); border-radius:24px; overflow:hidden; box-shadow:var(--shadow); border:1.5px solid var(--border); transition:background .35s; }
#map { width:100%; height:50vh; }
.leaflet-container { background:var(--card) !important; }

#region-tooltip { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(60,40,40,.82); color:#fff; font-size:13px; font-weight:700; padding:8px 18px; border-radius:20px; pointer-events:none; opacity:0; transition:opacity .25s; z-index:500; white-space:nowrap; backdrop-filter:blur(4px); }
#region-tooltip.show { opacity:1; }

#map-panel { padding:12px 14px 0; }
.section-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.section-header .dot { width:8px; height:8px; background:var(--main); border-radius:50%; transition:background .35s; }
.section-header span { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
#map-trip-list { display:flex; flex-direction:column; gap:10px; max-height:22vh; overflow-y:auto; padding-bottom:10px; }

#records-tab { padding:12px 14px 0; }
#filter-section { background:rgba(255,255,255,.55); border-radius:18px; padding:14px 14px 10px; margin-bottom:12px; border:1.5px solid var(--border); }
.filter-title { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
.filter-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:4px; }
.chip { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:500; border:1.5px solid var(--border); background:var(--white); color:var(--muted); cursor:pointer; transition:background .15s,color .15s,border-color .15s; font-family:'Noto Sans KR',sans-serif; }
.chip.active { background:var(--main); color:#fff; border-color:var(--main); }
.filter-divider { height:1px; background:var(--border); margin:10px 0; }
#filter-count { font-size:11px; color:var(--muted); margin-top:8px; }
#records-list { display:flex; flex-direction:column; gap:10px; max-height:calc(100vh - 340px); overflow-y:auto; padding-bottom:90px; }

.trip-card { background:var(--white); border:1.5px solid var(--border); border-radius:18px; padding:14px 16px; cursor:pointer; transition:transform .15s; }
.trip-card:active { transform:scale(.98); }
.trip-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.trip-card .region { font-size:15px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:7px; }
.color-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; box-shadow:0 1px 3px rgba(0,0,0,.15); }
.trip-card .date { font-size:10px; color:var(--muted); background:var(--light); padding:3px 8px; border-radius:20px; white-space:nowrap; transition:background .35s; }
.trip-card .companions { font-size:12px; color:var(--deep); font-weight:500; margin-top:2px; }
.trip-card .memo { font-size:12px; color:var(--muted); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.empty-state { text-align:center; padding:32px 20px; color:var(--muted); font-size:13px; line-height:2; background:var(--white); border-radius:18px; border:1.5px dashed var(--border); }

#fab { position:fixed; bottom:28px; right:18px; width:56px; height:56px; border-radius:50%; background:var(--main); color:#fff; font-size:28px; font-weight:300; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 var(--deep),0 6px 20px rgba(0,0,0,.12); z-index:1000; transition:transform .12s,box-shadow .12s,background .35s; line-height:1; }
#fab:active { transform:translateY(3px); box-shadow:0 1px 0 var(--deep),0 3px 10px rgba(0,0,0,.1); }

#modal-overlay,#detail-overlay { display:none; position:fixed; inset:0; background:rgba(60,40,40,.22); backdrop-filter:blur(2px); z-index:2000; align-items:flex-end; }
#modal-overlay.open,#detail-overlay.open { display:flex; }
#modal,#detail-sheet { background:var(--bg); border-radius:28px 28px 0 0; padding:28px 18px 44px; width:100%; max-height:88vh; overflow-y:auto; animation:slideUp .28s cubic-bezier(.34,1.2,.64,1); transition:background .35s; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:36px; height:4px; background:var(--main); border-radius:4px; margin:0 auto 20px; opacity:.5; transition:background .35s; }
#modal h2,#detail-sheet h2 { font-size:20px; font-weight:900; color:var(--text); margin-bottom:20px; }

.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:7px; }
.form-group input,.form-group select,.form-group textarea { width:100%; padding:13px 16px; background:var(--white); border:1.5px solid var(--border); border-radius:16px; font-family:'Noto Sans KR',sans-serif; font-size:15px; color:var(--text); outline:none; -webkit-appearance:none; transition:border-color .2s; }
.form-group textarea { resize:none; height:82px; }
.form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--main); }
.date-range { display:flex; align-items:center; gap:8px; }
.date-range input { flex:1; }
.date-range span { font-size:14px; color:var(--main); flex-shrink:0; font-weight:700; }
.color-palette { display:flex; flex-wrap:wrap; gap:5px; padding:4px 0; }
.color-swatch { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:transform .15s,border-color .15s; box-shadow:0 1px 4px rgba(0,0,0,.12); flex-shrink:0; }
.color-swatch:active { transform:scale(.88); }
.color-swatch.selected { border-color:var(--text); transform:scale(1.15); }
.palette-row { display:flex; gap:5px; margin-bottom:0; }

#modal-actions { display:flex; gap:10px; margin-top:22px; }
#btn-cancel { flex:1; padding:15px; background:var(--white); border:1.5px solid var(--border); border-radius:16px; font-family:'Noto Sans KR',sans-serif; font-size:15px; color:var(--muted); cursor:pointer; }
#btn-save { flex:2; padding:15px; background:var(--main); border:none; border-radius:16px; box-shadow:0 3px 0 var(--deep); font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700; color:#fff; cursor:pointer; transition:transform .1s,box-shadow .1s,background .35s; }
#btn-save:active { transform:translateY(2px); box-shadow:0 1px 0 var(--deep); }

#detail-sheet h2 { font-size:22px; margin-bottom:4px; }
.detail-date { font-size:12px; color:var(--muted); margin-bottom:18px; }
.detail-row { margin-bottom:12px; }
.detail-label { font-size:11px; color:var(--muted); font-weight:700; letter-spacing:.8px; text-transform:uppercase; margin-bottom:4px; }
.detail-value { font-size:14px; color:var(--text); line-height:1.6; }
#btn-detail-close { width:100%; margin-top:22px; padding:15px; background:var(--white); border:1.5px solid var(--border); border-radius:16px; font-family:'Noto Sans KR',sans-serif; font-size:15px; color:var(--muted); cursor:pointer; }
#btn-detail-delete { width:100%; margin-top:10px; padding:15px; background:none; border:1.5px solid #FFB3B3; border-radius:16px; font-family:'Noto Sans KR',sans-serif; font-size:15px; color:#E05555; cursor:pointer; }
</style>
</head>
<body>

<div id="theme-bar">
  <div class="theme-btn active" data-theme="pink"   style="background:#F4A7B9"></div>
  <div class="theme-btn"        data-theme="green"  style="background:#9AB17A"></div>
  <div class="theme-btn"        data-theme="blue"   style="background:#81A6C6"></div>
  <div class="theme-btn"        data-theme="purple" style="background:#8494FF"></div>
</div>

<header>
  <div class="title-badge"><h1>우리가족 여행지도</h1></div>
  <div class="stats-pills">
    <span>방문 지역 <strong id="count-visited">0</strong>곳</span>
    <span>총 여행 <strong id="count-trips">0</strong>회</span>
  </div>
</header>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="map-tab">🗺️ 여행지도</button>
  <button class="tab-btn"        data-tab="records-tab">📋 여행기록</button>
</div>

<div id="map-tab" class="tab-content active">
  <div id="map-card"><div id="map"></div></div>
  <div id="map-panel">
    <div class="section-header"><div class="dot"></div><span>최근 여행</span></div>
    <div id="map-trip-list"></div>
  </div>
</div>

<div id="records-tab" class="tab-content">
  <div id="filter-section">
    <div class="filter-title">지역 필터</div>
    <div class="filter-chips" id="region-filters"></div>
    <div class="filter-divider"></div>
    <div class="filter-title">가족 필터</div>
    <div class="filter-chips" id="person-filters"></div>
    <div id="filter-count"></div>
  </div>
  <div id="records-list"></div>
</div>

<div id="region-tooltip"></div>
<button id="fab">+</button>

<div id="modal-overlay">
  <div id="modal">
    <div class="modal-handle"></div>
    <h2>여행 기록 추가 ✈️</h2>
    <div class="form-group">
      <label>여행지</label>
      <select id="f-region"><option value="">어디 다녀오셨나요?</option></select>
    </div>
    <div class="form-group">
      <label>여행 기간</label>
      <div class="date-range">
        <input type="date" id="f-date-start">
        <span>~</span>
        <input type="date" id="f-date-end">
      </div>
    </div>
    <div class="form-group">
      <label>색상 선택</label>
      <div class="color-palette" id="color-palette"></div>
    </div>
    <div class="form-group">
      <label>함께 간 사람</label>
      <div class="filter-chips" id="companion-chips" style="margin-bottom:8px;"></div>
      <input type="text" id="f-companions" placeholder="직접 입력도 가능해요">
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="f-memo" placeholder="이번 여행에서 기억에 남는 것들을 적어봐요 💕"></textarea>
    </div>
    <div id="modal-actions">
      <button id="btn-cancel">취소</button>
      <button id="btn-save">저장하기 💾</button>
    </div>
  </div>
</div>

<div id="detail-overlay">
  <div id="detail-sheet">
    <div class="modal-handle"></div>
    <h2 id="d-region"></h2>
    <p class="detail-date" id="d-date"></p>
    <div class="detail-row"><div class="detail-label">함께한 사람</div><div class="detail-value" id="d-companions"></div></div>
    <div class="detail-row"><div class="detail-label">메모</div><div class="detail-value" id="d-memo"></div></div>
    <button id="btn-detail-close">닫기</button>
    <button id="btn-detail-delete">🗑️ 이 기록 삭제</button>
  </div>
</div>

<script>
// 모든 테마 공통 파스텔 팔레트 (카테고리별 진한→연한, 5개씩)
const PASTEL_PALETTE = [
  '#E8607A','#F28FA0','#F7B8C2','#FACDD4','#FDE4E8', // 핑크
  '#E8834A','#F5A878','#F8C4A0','#FAD8C0','#FCE8D8', // 주황
  '#D4A820','#E8C860','#F0D888','#F5E8B0','#FAF2D0', // 옐로우
  '#6A9E54','#8FBA78','#AECE9C','#C8E0BC','#DEEEDE', // 그린
  '#4A9488','#72B4AC','#98CAC4','#BEDCD8','#D8EEEC', // 민트
  '#5888B8','#7EAAD0','#A4C4E0','#C0D8EC','#DCEAF6', // 블루
  '#8070C0','#A090D4','#BEB0E4','#D4CCF0','#E8E4F8'  // 라벤더
];

const THEMES = {
  pink:  {bg:'#FFE8ED',card:'#FFF5E4',main:'#F4A7B9',deep:'#E8849A',light:'#FFDCE4',text:'#5C3A3A',muted:'#B8909A',border:'rgba(244,167,185,0.4)',shadow:'0 4px 20px rgba(232,132,154,0.15)',mapU:'#EDE0DC',mapB:'#D8C8C4'},
  green: {bg:'#EEF4E3',card:'#F7FAF0',main:'#9AB17A',deep:'#7A9660',light:'#D8ECBB',text:'#3A4A2A',muted:'#7A9060',border:'rgba(154,177,122,0.35)',shadow:'0 4px 20px rgba(120,160,80,0.13)',mapU:'#E0EAD8',mapB:'#C8D8BC'},
  blue:  {bg:'#E8F2F8',card:'#F5FAFD',main:'#81A6C6',deep:'#5A88AA',light:'#D0E8F4',text:'#2A3D4F',muted:'#6A8EA8',border:'rgba(129,166,198,0.35)',shadow:'0 4px 20px rgba(90,136,170,0.13)',mapU:'#D8E4EC',mapB:'#C0D0DC'},
  purple:{bg:'#EDECFF',card:'#F7F6FF',main:'#8494FF',deep:'#6367FF',light:'#C9BEFF',text:'#2A2860',muted:'#7070BB',border:'rgba(132,148,255,0.35)',shadow:'0 4px 20px rgba(99,103,255,0.13)',mapU:'#DCD8F0',mapB:'#C4C0E0'}
};
let currentTheme = localStorage.getItem('family-theme')||'pink';

function applyTheme(name) {
  const t=THEMES[name],r=document.documentElement;
  r.style.setProperty('--bg',t.bg); r.style.setProperty('--card',t.card);
  r.style.setProperty('--main',t.main); r.style.setProperty('--deep',t.deep);
  r.style.setProperty('--light',t.light); r.style.setProperty('--text',t.text);
  r.style.setProperty('--muted',t.muted); r.style.setProperty('--border',t.border);
  r.style.setProperty('--shadow',t.shadow); r.style.setProperty('--mapU',t.mapU); r.style.setProperty('--mapB',t.mapB);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===name));
  buildPalette();
  if(Object.keys(layers).length>0) refreshMap();
  currentTheme=name; localStorage.setItem('family-theme',name);
}
document.querySelectorAll('.theme-btn').forEach(b=>b.addEventListener('click',()=>applyTheme(b.dataset.theme)));

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='records-tab') renderRecords();
  });
});

const REGION_GROUPS = {
  '서울·경기·인천':['서울특별시','인천광역시','수원시','성남시','고양시','용인시','부천시','안산시','안양시','남양주시','화성시','평택시','의정부시','시흥시','파주시','김포시','광명시','광주시','군포시','하남시','오산시','이천시','안성시','의왕시','양주시','구리시','여주시','동두천시','과천시','가평군','양평군','연천군'],
  '강원':['춘천시','원주시','강릉시','동해시','태백시','속초시','삼척시','홍천군','횡성군','영월군','평창군','정선군','철원군','화천군','양구군','인제군','고성군','양양군'],
  '충청':['세종특별자치시','대전광역시','청주시','충주시','제천시','보은군','옥천군','영동군','증평군','진천군','괴산군','음성군','단양군','천안시','공주시','보령시','아산시','서산시','논산시','계룡시','당진시','금산군','부여군','서천군','청양군','홍성군','예산군','태안군'],
  '전라':['광주광역시','전주시','군산시','익산시','정읍시','남원시','김제시','완주군','진안군','무주군','장수군','임실군','순창군','고창군','부안군','목포시','여수시','순천시','나주시','광양시','담양군','곡성군','구례군','고흥군','보성군','화순군','장흥군','강진군','해남군','영암군','무안군','함평군','영광군','장성군','완도군','진도군','신안군'],
  '경상':['대구광역시','부산광역시','울산광역시','포항시','경주시','김천시','안동시','구미시','영주시','영천시','상주시','문경시','경산시','의성군','청송군','영양군','영덕군','청도군','고령군','성주군','칠곡군','예천군','봉화군','울진군','울릉군','창원시','진주시','통영시','사천시','김해시','밀양시','거제시','양산시','의령군','함안군','창녕군','고성군','남해군','하동군','산청군','함양군','거창군','합천군'],
  '제주':['제주시','서귀포시']
};
const FAMILY = ['창견','은주','예진','유진'];
let activeRegionFilter = null;
let activePersonFilters = new Set();

function buildFilters() {
  const rf=document.getElementById('region-filters'); rf.innerHTML='';
  ['전체',...Object.keys(REGION_GROUPS)].forEach(label=>{
    const c=document.createElement('button'); c.className='chip'; c.type='button';
    c.textContent=label; c.dataset.region=label;
    if(label==='전체'&&!activeRegionFilter) c.classList.add('active');
    if(label===activeRegionFilter) c.classList.add('active');
    c.addEventListener('click',()=>{
      activeRegionFilter=label==='전체'?null:label;
      document.querySelectorAll('#region-filters .chip').forEach(x=>x.classList.toggle('active',x.dataset.region===label));
      renderRecords();
    });
    rf.appendChild(c);
  });
  const pf=document.getElementById('person-filters'); pf.innerHTML='';
  FAMILY.forEach(name=>{
    const c=document.createElement('button'); c.className='chip'; c.type='button';
    c.textContent=name; if(activePersonFilters.has(name)) c.classList.add('active');
    c.addEventListener('click',()=>{
      if(activePersonFilters.has(name)) activePersonFilters.delete(name);
      else activePersonFilters.add(name);
      c.classList.toggle('active',activePersonFilters.has(name));
      renderRecords();
    });
    pf.appendChild(c);
  });
}

let selectedColor=PASTEL_PALETTE[0];
let trips=JSON.parse(localStorage.getItem('family-trips')||'[]');
let map,layers={};
let tooltipTimer=null;

const sel=document.getElementById('f-region');
REGIONS_GROUPED.forEach(g=>{
  const og=document.createElement('optgroup'); og.label=g.label;
  g.options.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;og.appendChild(o);});
  sel.appendChild(og);
});

const ccWrap=document.getElementById('companion-chips');
FAMILY.forEach(name=>{
  const c=document.createElement('button'); c.type='button'; c.className='chip'; c.textContent=name;
  c.addEventListener('click',()=>{ c.classList.toggle('active'); updateCompanionInput(); });
  ccWrap.appendChild(c);
});
function updateCompanionInput(){
  const active=[...ccWrap.querySelectorAll('.chip.active')].map(x=>x.textContent);
  document.getElementById('f-companions').value=active.join(', ');
}

function buildPalette(){
  const p=document.getElementById('color-palette'); p.innerHTML='';
  selectedColor=PASTEL_PALETTE[0];
  // 5개씩 한 줄로
  for(let i=0;i<PASTEL_PALETTE.length;i+=5){
    const row=document.createElement('div'); row.className='palette-row';
    for(let j=i;j<i+5&&j<PASTEL_PALETTE.length;j++){
      const hex=PASTEL_PALETTE[j];
      const sw=document.createElement('div');
      sw.className='color-swatch'+(j===0?' selected':'');
      sw.style.background=hex;
      sw.addEventListener('click',()=>{
        document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
        sw.classList.add('selected'); selectedColor=hex;
      });
      row.appendChild(sw);
    }
    p.appendChild(row);
  }
}

const today=new Date().toISOString().split('T')[0];
document.getElementById('f-date-start').value=today;
document.getElementById('f-date-end').value=today;
document.getElementById('f-date-start').addEventListener('change',e=>{
  const end=document.getElementById('f-date-end');
  if(end.value<e.target.value)end.value=e.target.value; end.min=e.target.value;
});

// 레이어 키 = code (고유값)
function makeKey(f){return f.properties.code;}

// region 이름 → 해당하는 code 목록 반환
function getKeys(rn){
  if(SIDO_CODE[rn]){
    // 광역시: 해당 시도 코드로 시작하는 모든 레이어 code
    const prefix=SIDO_CODE[rn];
    return Object.keys(layers).filter(k=>k.startsWith(prefix));
  }
  // 일반 시/군: 이름이 일치하는 레이어 code 찾기
  const matched=Object.entries(layers).find(([code,layer])=>layer.feature.properties.name===rn);
  return matched?[matched[0]]:[];
}

function getColor(key){for(const t of trips)if(getKeys(t.region).includes(key))return t.color||PASTEL_PALETTE[0];return null;}
function shade(hex,p){const n=parseInt(hex.slice(1),16);const r=Math.min(255,Math.max(0,(n>>16)+p));const g=Math.min(255,Math.max(0,((n>>8)&0xff)+p));const b=Math.min(255,Math.max(0,(n&0xff)+p));return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function styleF(f){const key=makeKey(f),color=getColor(key);if(!color)return{fillColor:THEMES[currentTheme].mapU,fillOpacity:.5,color:THEMES[currentTheme].mapB,weight:.8};return{fillColor:color,fillOpacity:.82,color:shade(color,-28),weight:.8};}

function showTooltip(name){
  const t=document.getElementById('region-tooltip');
  t.textContent=name; t.classList.add('show');
  clearTimeout(tooltipTimer); tooltipTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

function initMap(){
  map=L.map('map',{center:[36.2,127.8],zoom:6.3,zoomControl:false,attributionControl:false});
  fetch('./korea-map.json')
    .then(r=>r.json()).then(data=>{
      L.geoJSON(data,{
        style:f=>styleF(f),
        onEachFeature:(f,layer)=>{
          const key=makeKey(f),name=f.properties.name;
          layers[key]=layer;
          layer.on('click',()=>{
            const matched=trips.filter(t=>getKeys(t.region).includes(key));
            if(matched.length>0) showDetail(matched[matched.length-1]);
            else showTooltip(name);
          });
        }
      }).addTo(map); renderAll();
    }).catch(()=>{
      document.getElementById('map').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;font-size:13px;gap:8px;opacity:.5;">🗺️<span>배포 후 지도가 보여요!</span></div>';
    });
}

function refreshMap(){
  Object.entries(layers).forEach(([key,layer])=>{
    const color=getColor(key);
    if(!color){layer.setStyle({fillColor:THEMES[currentTheme].mapU,fillOpacity:.5,color:THEMES[currentTheme].mapB,weight:.8});return;}
    layer.setStyle({fillColor:color,fillOpacity:.82,color:shade(color,-28),weight:.8});
  });
}

function fmtDate(s,e){if(!e||s===e)return s;return`${s} ~ ${e}`;}
function makeTripCard(t){
  return`<div class="trip-card" onclick="showDetail(trips.find(x=>x.id==='${t.id}'))">
    <div class="trip-card-header">
      <span class="region"><span class="color-dot" style="background:${t.color||THEMES[currentTheme].colors[0]}"></span>${t.region}</span>
      <span class="date">${fmtDate(t.dateStart||t.date,t.dateEnd)}</span>
    </div>
    ${t.companions?`<div class="companions">💕 ${t.companions}</div>`:''}
    ${t.memo?`<div class="memo">${t.memo}</div>`:''}
  </div>`;
}

function renderMapList(){
  const list=document.getElementById('map-trip-list');
  if(trips.length===0){list.innerHTML=`<div class="empty-state">아직 기록이 없어요 ${THEMES[currentTheme].emoji}</div>`;return;}
  const sorted=[...trips].sort((a,b)=>new Date(b.dateStart||b.date)-new Date(a.dateStart||a.date)).slice(0,5);
  list.innerHTML=sorted.map(makeTripCard).join('');
}

function renderRecords(){
  buildFilters();
  let filtered=[...trips];
  if(activeRegionFilter){const allowed=REGION_GROUPS[activeRegionFilter]||[];filtered=filtered.filter(t=>allowed.includes(t.region));}
  if(activePersonFilters.size>0){filtered=filtered.filter(t=>{if(!t.companions)return false;return[...activePersonFilters].some(p=>t.companions.includes(p));});}
  filtered.sort((a,b)=>new Date(b.dateStart||b.date)-new Date(a.dateStart||a.date));
  document.getElementById('filter-count').textContent=`총 ${filtered.length}개의 기록`;
  const list=document.getElementById('records-list');
  if(filtered.length===0){list.innerHTML=`<div class="empty-state">해당 조건의 기록이 없어요 ${THEMES[currentTheme].emoji}</div>`;return;}
  list.innerHTML=filtered.map(makeTripCard).join('');
}

function renderStats(){
  document.getElementById('count-visited').textContent=new Set(trips.map(t=>t.region)).size;
  document.getElementById('count-trips').textContent=trips.length;
}
function renderAll(){renderMapList();renderStats();refreshMap();}

function showDetail(trip){
  if(!trip)return;
  document.getElementById('d-region').textContent=trip.region;
  document.getElementById('d-date').textContent='📅 '+fmtDate(trip.dateStart||trip.date,trip.dateEnd);
  document.getElementById('d-companions').textContent=trip.companions||'-';
  document.getElementById('d-memo').textContent=trip.memo||'-';
  document.getElementById('detail-overlay').dataset.tripId=trip.id;
  document.getElementById('detail-overlay').classList.add('open');
}

document.getElementById('fab').addEventListener('click',()=>document.getElementById('modal-overlay').classList.add('open'));
document.getElementById('btn-cancel').addEventListener('click',()=>document.getElementById('modal-overlay').classList.remove('open'));
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');});
document.getElementById('btn-save').addEventListener('click',()=>{
  const region=document.getElementById('f-region').value;
  const dateStart=document.getElementById('f-date-start').value;
  const dateEnd=document.getElementById('f-date-end').value;
  if(!region||!dateStart){alert('여행지와 날짜는 필수예요! '+THEMES[currentTheme].emoji);return;}
  const trip={id:Date.now().toString(),region,dateStart,dateEnd:dateEnd||dateStart,color:selectedColor,companions:document.getElementById('f-companions').value,memo:document.getElementById('f-memo').value};
  trips.push(trip); localStorage.setItem('family-trips',JSON.stringify(trips));
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('f-region').value='';
  document.getElementById('f-companions').value='';
  document.getElementById('f-memo').value='';
  ccWrap.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  renderAll();
});
document.getElementById('btn-detail-close').addEventListener('click',()=>document.getElementById('detail-overlay').classList.remove('open'));
document.getElementById('btn-detail-delete').addEventListener('click',()=>{
  const id=document.getElementById('detail-overlay').dataset.tripId;
  if(!id)return;
  if(!confirm('이 여행 기록을 삭제할까요?'))return;
  trips=trips.filter(t=>t.id!==id);
  localStorage.setItem('family-trips',JSON.stringify(trips));
  document.getElementById('detail-overlay').classList.remove('open');
  renderAll();
});
document.getElementById('detail-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('detail-overlay'))document.getElementById('detail-overlay').classList.remove('open');});

applyTheme(currentTheme);
buildFilters();
initMap();
</script>
